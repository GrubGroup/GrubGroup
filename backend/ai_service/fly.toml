# fly.toml app configuration file generated for grubgroup-ai on 2026-07-23T02:13:46-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'grubgroup-ai'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  EMBEDDING_MODEL = 'qwen/qwen3-embedding-8b'
  ENV = 'production'
  JWT_ALGORITHM = 'HS256'
  LLM_MODEL = 'deepseek/deepseek-chat'
  OPENROUTER_BASE_URL = 'https://openrouter.ai/api/v1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
