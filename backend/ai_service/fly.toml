# Fly.io config for the GrubGroup AI service (FastAPI, Python 3.14, uv).
# Builds from the existing Dockerfile (CMD binds --port 8000). Secrets
# (DATABASE_URL, JWT_SECRET, OPENROUTER_API_KEY, GEOCODIO_API_KEY) are set with
# `fly secrets set`, NEVER in this file.
#
# Reached PRIVATELY by the gateway over Flycast at http://grubgroup-ai.internal:8000
# — keep both apps in the same Fly org. The X-Internal-Secret (JWT_SECRET) guard
# still applies; this is defense in depth, not the only protection.
app = "grubgroup-ai"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  JWT_ALGORITHM = "HS256"
  OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
  EMBEDDING_MODEL = "qwen/qwen3-embedding-8b"
  LLM_MODEL = "deepseek/deepseek-chat"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/api/v1/health"
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
