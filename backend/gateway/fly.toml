# fly.toml app configuration file generated for grubgroup-gateway on 2026-07-23T02:48:21-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'grubgroup-gateway'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  CROSS_SITE_COOKIES = 'true'
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
